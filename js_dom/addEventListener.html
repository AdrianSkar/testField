<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Event listeners</title>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const click_button = document.querySelector('#click_button');

			function eventHandler(event) {

				console.log('event:', event);
				console.log('event.type:', event.type);
				console.log('event.target:', event.target);
				console.log('event.currentTarget:', event.currentTarget);
			}

			const handleObj = {
				handleEvent: function (evt) {
					console.log('handleEvent prop instead of function');
					console.log(evt);
				}
			}

			click_button.addEventListener('click', eventHandler);
			click_button.addEventListener('mouseover', handleObj)
		});

	</script>
</head>

<body>
	<button id="click_button">Log event info (mouseover/click)</button>
	<div id="content">

	</div>
	<p>
		<a href="https://developer.mozilla.org/en-US/docs/Web/API/EventTarget">EventTarget</a><br>
		<a href="https://developer.mozilla.org/en-US/docs/Web/API/EventListener">EventTarget.EventListener</a><br>
		<a
			href="https://developer.mozilla.org/en-US/docs/Web/API/EventTarget/addEventListener">EventTarget.addEventListener()</a><br>
		<a
			href="https://developer.mozilla.org/en-US/docs/Web/API/EventListener/handleEvent">EventTarget.handleEvent()</a><br>
	</p>
</body>

</html>
